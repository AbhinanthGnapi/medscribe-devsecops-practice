name: DevSecOps Pipeline

on:
  push:
    branches:
      - main
      - dev
      - Quality-gate

  pull_request:
    branches:
      - main
      - dev
env:
  NODE_VERSION: "22"
  BUILD_DIR: "dist"
  ARTIFACT_NAME: "application.zip"

jobs:

  generate-sbom:
    name: Generate Software Bill of Materials
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Dependencies
        run: npm ci

      - name: Install CycloneDX Generator
        run: npm install -g @cyclonedx/cyclonedx-npm

      - name: Generate SBOM
        run: cyclonedx-npm --output-file sbom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-report
          path: sbom.json

  license-check:
    name: Verify Open Source Licenses
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Project Dependencies
        run: npm ci

      - name: Install License Checker
        run: npm install -g license-checker

      - name: Generate JSON License Report
        run: license-checker --json --out licenses.json

      - name: Generate Text License Report
        run: license-checker > licenses.txt

      - name: Display License Summary
        run: license-checker --summary

      - name: Validate License Policy
        run: node scripts/check-licenses.cjs

      - name: Upload License Reports
        uses: actions/upload-artifact@v4
        with:
          name: license-report
          path: |
            licenses.json
            licenses.txt

  artifact-signing:
      name: Build and Sign Artifact
      needs:
        - generate-sbom
        - license-check
      runs-on: windows-latest

      steps:
        - name: Checkout Repository
          uses: actions/checkout@v4

        - name: Setup Node.js
          uses: actions/setup-node@v4
          with:
            node-version: ${{ env.NODE_VERSION }}

        - name: Install Dependencies
          run: npm ci

        - name: Build Project
          run: npm run build

        - name: Package Build
          shell: pwsh 
          run: |
            Compress-Archive `
              -Path "${{ env.BUILD_DIR }}\*" `
              -DestinationPath "${{ env.ARTIFACT_NAME }}"

        - name: Install Cosign
          uses: sigstore/cosign-installer@v3

        - name: Restore Cosign Private Key
          shell: bash
          run: |
            echo "${{ secrets.COSIGN_PRIVATE_KEY }}" > cosign.key

        - name: Sign Artifact
          shell: bash
          env:
            COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          run: |
            cosign sign-blob \
            --yes \
            --key cosign.key \
            --output-signature "${{ env.ARTIFACT_NAME }}.sig" \
            "${{ env.ARTIFACT_NAME }}"

        - name: Verify Signature
          shell: bash
          run: |
            cosign verify-blob \
              --key security/cosign.pub \
              --signature "${{ env.ARTIFACT_NAME }}.sig" \
              "${{ env.ARTIFACT_NAME }}"

        - name: Upload Build Artifact
          uses: actions/upload-artifact@v4
          with:
            name: medscribe-build
            path: ${{ env.ARTIFACT_NAME }}

        - name: Upload Signature
          uses: actions/upload-artifact@v4
          with:
            name: medscribe-signature
            path: ${{ env.ARTIFACT_NAME }}.sig
  
  policy-check:
      name: Policy Enforcement
      needs:
        - artifact-signing
      runs-on: ubuntu-latest

      steps:
        - name: Checkout Repository
          uses: actions/checkout@v4

        - name: Download SBOM
          uses: actions/download-artifact@v4
          with:
            name: sbom-report

        - name: Download License Report
          uses: actions/download-artifact@v4
          with:
            name: license-report

        - name: Download Build Artifact
          uses: actions/download-artifact@v4
          with:
            name: medscribe-build

        - name: Download Signature
          uses: actions/download-artifact@v4
          with:
            name: medscribe-signature

        - name: Validate SBOM
          run: |
            test -f sbom.json || (echo "❌ SBOM not found" && exit 1)
            echo "✅ SBOM found"

        - name: Validate License Report
          run: |
            test -f licenses.json || (echo "❌ License report not found" && exit 1)
            echo "✅ License report found"

        - name: Validate License Policy
          run: |
            test -f config/allowed-licenses.json || (echo "❌ License policy missing" && exit 1)
            echo "✅ License policy found"

        - name: Validate Cosign Public Key
          run: |
            test -f security/cosign.pub || (echo "❌ Public key missing" && exit 1)
            echo "✅ Public key found"

        - name: Validate Build Artifact
          run: |
            test -f "${{ env.ARTIFACT_NAME }}" || (echo "❌ Build artifact missing" && exit 1)
            echo "✅ Build artifact found"

        - name: Validate Signature
          run: |
            test -f "${{ env.ARTIFACT_NAME }}.sig" || (echo "❌ Signature missing" && exit 1)
            echo "✅ Signature found"

        - name: Install Cosign
          uses: sigstore/cosign-installer@v3

        - name: Verify Artifact Signature
          run: |
            cosign verify-blob \
              --key security/cosign.pub \
              --signature "${{ env.ARTIFACT_NAME }}.sig" \
              "${{ env.ARTIFACT_NAME }}"

        - name: Policy Enforcement Passed
          run: |
            echo "======================================"
            echo " DevSecOps Policy Enforcement Passed "
            echo "======================================"